<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="utf-8" />
  <meta name="viewport"
    content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0,viewport-fit=cover" />
  <title>ร้านเกื้อกูลกัน</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script type="module" src="/index.js"></script>
</head>

<body id="body">
  <div class="app-container">
    <!-- Shop Header -->
    <header class="app-header">
      <h1 class="shop-name">ร้านเกื้อกูลกัน</h1>
      <p class="shop-subtitle">ยินดีต้อนรับสมาชิกทุกท่าน</p>
    </header>

    <!-- Membership Card UI -->
    <div class="member-card" id="profile">
      <div class="card-header">
        <span class="card-logo">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
          </svg>
          เกื้อกูลกัน
        </span>
        <span class="card-type">MEMBER</span>
      </div>

      <div class="card-profile-section">
        <div class="profile-avatar-wrapper">
          <img id="pictureUrl" class="profile-avatar" src="https://vos.line-scdn.net/imgs/apis/ic_mini.png" alt="Profile Picture" />
        </div>
        <div class="profile-meta">
          <div id="displayName" class="profile-name">กำลังโหลด...</div>
          <div id="statusMessage" class="profile-status">ยินดีต้อนรับสมาชิกใหม่</div>
        </div>
      </div>

      <div class="card-details">
        <!-- Email Row -->
        <div class="detail-row">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
            <polyline points="22,6 12,13 2,6"></polyline>
          </svg>
          <span class="detail-label">อีเมล:</span>
          <span id="email" class="detail-val">กำลังโหลด...</span>
        </div>

        <!-- Phone Row -->
        <div class="detail-row">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
          </svg>
          <span class="detail-label">โทร:</span>
          <div class="phone-input-container">
            <input type="tel" id="phone" class="phone-input" placeholder="ระบุเบอร์โทรศัพท์..." />
            <button id="btnSavePhoneInline" class="btn-save-inline" title="บันทึกเบอร์โทร">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <div class="card-footer">
        <span class="card-id-label">MEMBER ID</span>
        <span id="userId" class="card-id-val">------------------------</span>
      </div>
    </div>

    <!-- Buttons Section -->
    <div class="actions-section">
      <button id="btnNextPage" class="btn-premium btn-primary-gradient">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <path d="M16 10a4 4 0 0 1-8 0"></path>
        </svg>
        ดูแค็ตตาล็อกสินค้า (Catalog)
      </button>

      <button id="btnSaveData" class="btn-premium btn-secondary-outline">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
          <polyline points="17 21 17 13 7 13 7 21"></polyline>
          <polyline points="7 3 7 8 15 8"></polyline>
        </svg>
        อัปเดตข้อมูลลูกค้า
      </button>
    </div>
  </div>

  <!-- Dynamic Notification Toast -->
  <div id="toast" class="toast">
    <div class="toast-icon">✓</div>
    <span id="toastMessage">บันทึกข้อมูลเรียบร้อย</span>
  </div>
</body>

</html>
