<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport"
    content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0,viewport-fit=cover" />
  <title>ร้านเกื้อกูลกัน</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script type="module" src="/index.js"></script>
</head>

<body id="body">
  <!-- Shop Header -->
  <header style="text-align: center; margin-top: 10px; margin-bottom: 25px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
    <h1 style="font-size: 26px; color: #ffffff; margin: 0 0 4px 0; font-weight: 700; text-shadow: 0 2px 4px rgba(0,0,0,0.12);">ร้านเกื้อกูลกัน</h1>
    <p style="font-size: 14px; color: #f0f2f7; margin: 0; border-bottom: none; opacity: 0.9;">ยินดีต้อนรับสมาชิกทุกท่าน</p>
  </header>

  <section id="profile">
    <img id="pictureUrl" src="https://vos.line-scdn.net/imgs/apis/ic_mini.png" />
    <p id="userId"></p>
    <p id="displayName"></p>
    <p id="statusMessage"></p>
    <p id="email"></p>
    <p id="phone"></p>

  </section>

  <section id="button">
    <button id="btnSaveData"
      style="padding: 10px 20px; font-size: 16px; background-color: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 20px;">บันทึกข้อมูลลูกค้า</button>
    <button id="btnNextPage"
      style="padding: 12px 20px; font-size: 16px; background-color: #c5a880; color: white; border: none; border-radius: 25px; cursor: pointer; width: 100%; margin-top: 12px; font-weight: bold; box-shadow: 0 4px 10px rgba(197, 168, 128, 0.3); transition: all 0.3s;">ดูแค็ตตาล็อกสินค้า (Catalog)</button>
  </section>
</body>

</html>
