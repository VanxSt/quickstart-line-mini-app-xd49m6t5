<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0,viewport-fit=cover"
    />
    <title>LINE MINI App</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="index.js" defer></script>
  </head>

  <body id="body">
    <section id="profile">
      <img
        id="pictureUrl"
        src="https://vos.line-scdn.net/imgs/apis/ic_mini.png"
      />
      <p id="userId"></p>
      <p id="displayName"></p>
      <p id="statusMessage"></p>
      <p id="email"></p>
      <p id="phone"></p>
    </section>

    <section id="button">
      <button id="btnSaveData" style="padding: 10px 20px; font-size: 16px; background-color: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 20px;">บันทึกข้อมูลลูกค้า</button>
      <button id="btnNextPage" style="padding: 10px 20px; font-size: 16px; background-color: #008CBA; color: white; border: none; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 10px;">ไปหน้าถัดไป</button>
    </section>
  </body>
</html>
